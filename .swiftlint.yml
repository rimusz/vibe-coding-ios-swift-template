# SwiftLint Configuration
# For more information: https://github.com/realm/SwiftLint

# Paths to include for linting
included:
  - Sources
  - Tests

# Paths to ignore
excluded:
  - .build
  - Pods
  - Carthage
  - DerivedData

# Rules to disable
disabled_rules:
  - trailing_whitespace

# Rules to enable (opt-in)
opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - force_unwrapping
  - redundant_optional_initialization
  - sorted_imports

# Rule configurations
line_length:
  warning: 120
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 50
  excluded:
    - id
    - URL
    - i
    - j
    - x
    - y

# Custom reporter (optional)
reporter: "xcode"
